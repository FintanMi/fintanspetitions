<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Browse Petitions</title>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a th:href="@{/}" class="logo">Fintan's Petitions</a>
            <div class="navbar-links">
                <a th:href="@{/search}">Search</a>
                <a th:href="@{/create}">Create a Petition</a>
            </div>
        </div>
    </nav>
    <div class="hero-section">
        <div class="hero-container">
            <h1 class="">Make your voice heard</h1>
            <p class="">Join thousands online to make change in your area</p>
        </div>
    </div>
    <main class="main-container">
        <div class="petition-grid">
            <div class="card" th:each="petition : ${petitions}">
                <span class="category-tag" th:text="${petition.category}">Category</span>
        
                <h3 class="petition-title">
                    <a th:href="@{/petition/{id}(id=${petition.id})}" th:text="${petition.title}" class="main-link">Title</a>
                </h3>
        
                <p th:text="${petition.description}">Description...</p>
        
                <div style="margin-top: auto; padding-top: 1rem; font-weight: bold;">
                    <span th:text="${petition.getSignatureCount()}">0</span> signatures
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-container">
        <div>
            <p class="mb-0">Fintan's Petitions</p>
        </div>
    </footer>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
</body>
</html>
